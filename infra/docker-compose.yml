version: '3.8'

services:
  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    container_name: llm-ui
    ports:
      - "${UI_PORT}:8501"
    networks:
      - frontend_net
    environment:
      - API_URL=${API_URL}
      - API_CHAT_PATH=${API_CHAT_PATH}
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: llm-api
    ports:
      - "${API_PORT}:8000"
    networks:
      - frontend_net
      - backend_net
    env_file:
      - .env
    depends_on:
      - ollama
      - postgres
      - chromadb
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-chroma
    ports:
      - "127.0.0.1:8200:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend_net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: llm-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    #  - ./init_demo_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: llm-langfuse
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET_KEY}
      - SALT=${LANGFUSE_PUBLIC_KEY}
      - NEXTAUTH_URL=http://localhost:3000
    networks:
      - backend_net
      - frontend_net
    depends_on:
      - postgres
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

volumes:
  ollama_data:
  chroma_data:
  postgres_data: