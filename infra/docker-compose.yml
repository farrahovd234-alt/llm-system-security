version: '3.8'

services:
  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    container_name: llm-ui
    ports:
      - "${UI_PORT:-8501}:8501"
    networks:
      - frontend_net
    environment:
      - API_URL=${API_URL}
      - API_CHAT_PATH=${API_CHAT_PATH}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: llm-api
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - frontend_net
      - backend_net
    env_file:
      - .env
    depends_on:
      - ollama
      - postgres
      - chromadb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-chroma
    ports:
      - "127.0.0.1:8200:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend_net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: llm-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_demo_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops_user} -d ${POSTGRES_DB:-langfuse}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: llm-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - backend_net
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: llm-langfuse
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CLICKHOUSE_URL=http://clickhouse:8123
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET_KEY}
      - SALT=${LANGFUSE_PUBLIC_KEY}
      - NEXTAUTH_URL=http://${TARGET_IP:-localhost}:${LANGFUSE_PORT:-3000}
      - TELEMETRY_ENABLED=false
    networks:
      - backend_net
      - frontend_net
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_started
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  ollama_data:
  chroma_data:
  postgres_data:
