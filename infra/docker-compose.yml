  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: llm-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - backend_net
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: llm-langfuse
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CLICKHOUSE_URL=http://clickhouse:8123    # <- добавлено
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET_KEY}
      - SALT=${LANGFUSE_PUBLIC_KEY}
      - NEXTAUTH_URL=http://${TARGET_IP:-localhost}:${LANGFUSE_PORT:-3000}
      - TELEMETRY_ENABLED=false
    networks:
      - backend_net
      - frontend_net
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:                                  # <- добавлено
        condition: service_started
    restart: unless-stopped
