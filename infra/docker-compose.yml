services:
  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    container_name: llm-ui
    ports:
      - "${UI_PORT:-8501}:8501"
    networks:
      - frontend_net
    environment:
      - API_URL=${API_URL}
      - API_CHAT_PATH=${API_CHAT_PATH}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: llm-api
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - frontend_net
      - backend_net
    env_file:
      - .env
    depends_on:
      - ollama
      - postgres
      - chromadb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend_net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: llm-chroma
    ports:
      - "127.0.0.1:8200:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - backend_net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: llm-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_demo_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops_user} -d ${POSTGRES_DB:-langfuse}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: llm-clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - backend_net
    environment:
      - CLICKHOUSE_DB=langfuse
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=clickhouse123
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider 'http://localhost:8123/ping' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  langfuse:
    image: langfuse/langfuse:2
    container_name: llm-langfuse
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      # Postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # ClickHouse — обязательно с логином:паролем и схемой
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:clickhouse123@clickhouse:9000/langfuse
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=clickhouse
      - CLICKHOUSE_PASSWORD=clickhouse123
      # Auth
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET_KEY}
      - SALT=${LANGFUSE_PUBLIC_KEY}
      - NEXTAUTH_URL=http://${TARGET_IP:-localhost}:${LANGFUSE_PORT:-3000}
      # Misc
      - TELEMETRY_ENABLED=false
      - LANGFUSE_INIT_ORG_ID=my-org
      - LANGFUSE_INIT_ORG_NAME=MyOrg
      - LANGFUSE_INIT_PROJECT_ID=my-project
      - LANGFUSE_INIT_PROJECT_NAME=MyProject
      - LANGFUSE_INIT_PROJECT_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_INIT_PROJECT_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_INIT_USER_EMAIL=admin@local.dev
      - LANGFUSE_INIT_USER_NAME=Admin
      - LANGFUSE_INIT_USER_PASSWORD=admin123
    networks:
      - backend_net
      - frontend_net
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  ollama_data:
  chroma_data:
  postgres_data:
  clickhouse_data:
